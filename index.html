<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Tube</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- NAVBAR -->

  <nav class="navbar">

    <div class="logo">
      <span class="red">A</span> Tube
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search videos...">
      <button id="searchBtn">Search</button>
    </div>

    <div class="user-area">
      <button class="signin-btn">Sign In</button>
    </div>

  </nav>


  <!-- SIDEBAR -->

  <aside class="sidebar">

    <div class="menu-item active">🏠 Home</div>
    <div class="menu-item">🔥 Trending</div>
    <div class="menu-item">🎮 Gaming</div>
    <div class="menu-item">🎵 Music</div>
    <div class="menu-item">📺 Live</div>
    <div class="menu-item">📰 News</div>
    <div class="menu-item">💻 Technology</div>
    <div class="menu-item">⚽ Sports</div>

  </aside>


  <!-- MAIN CONTENT -->

  <main class="main-content">

    <div class="categories">
      <button onclick="quickSearch('Trending')">Trending</button>
      <button onclick="quickSearch('Gaming')">Gaming</button>
      <button onclick="quickSearch('Music')">Music</button>
      <button onclick="quickSearch('Free Fire')">Free Fire</button>
      <button onclick="quickSearch('Football')">Football</button>
      <button onclick="quickSearch('Technology')">Technology</button>
      <button onclick="quickSearch('Anime')">Anime</button>
</html>
