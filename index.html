<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Tube</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="logo">🔥 A Tube</div>

  <div class="search">
    <input id="searchInput" placeholder="Search videos...">
    <button onclick="searchVideo()">Search</button>
  </div>

  <div class="actions">
    <button>Upload</button>
    <button>Login</button>
  </div>
</header>

<!-- SIDEBAR -->
<div class="sidebar">
  <button onclick="loadVideos('Trending')">Trending</button>
  <button onclick="loadVideos('Gaming')">Gaming</button>
  <button onclick="loadVideos('Music')">Music</button>
  <button onclick="loadVideos('Free Fire')">Free Fire</button>
  <button onclick="loadVideos('Technology')">Technology</button>
</div>

<!-- MAIN -->
<main>
  <div id="videoGrid" class="grid"></div>
</main>

<!-- VIDEO PLAYER -->
<div id="player" class="player">
  <iframe id="frame" allowfullscreen></iframe>
</div>

<script src="app.js"></script>

</body>
</html>
